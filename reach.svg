<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .label { font-family: 'JetBrains Mono', monospace; }
    </style>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="130" cy="130" r="120" fill="url(#globeGlow)"/>
  <circle cx="130" cy="130" r="90" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.55"/>
  <ellipse cx="130" cy="130" rx="90" ry="32" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.4"/>
  <ellipse cx="130" cy="130" rx="90" ry="60" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.4"/>
  <ellipse cx="130" cy="130" rx="32" ry="90" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>

  <path d="M95,95 Q130,60 168,150" stroke="#8B5CF6" stroke-width="1.2" fill="none" stroke-dasharray="4 3" opacity="0.75">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="3s" repeatCount="indefinite"/>
  </path>

  <circle cx="95" cy="95" r="4" fill="#22D3EE"/>
  <text x="60" y="83" class="label" font-size="11" fill="#94A3B8" letter-spacing="1">PARIS</text>

  <circle cx="168" cy="150" r="4" fill="#FB923C"/>
  <text x="176" y="168" class="label" font-size="11" fill="#94A3B8" letter-spacing="1">INDIA</text>
</svg>
