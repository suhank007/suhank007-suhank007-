<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .headline { font-family: 'Space Grotesk', Helvetica, Arial, sans-serif; }
      .label { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090A0F"/>
      <stop offset="100%" stop-color="#13141D"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <circle cx="900" cy="160" r="220" fill="url(#glow)"/>

  <!-- headline, left side -->
  <text x="60" y="120" class="headline" font-size="46" font-weight="700" fill="url(#textGrad)">ANKIT PARIHAR</text>
  <text x="62" y="154" class="label" font-size="13" fill="#94A3B8" letter-spacing="2">DASHBOARDS · REPORTING · PRODUCT UI</text>
  <text x="62" y="176" class="label" font-size="13" fill="#94A3B8" letter-spacing="2">TURNING DATA INTO SOMETHING PEOPLE ACTUALLY READ</text>
  <text x="62" y="230" class="label" font-size="12" fill="#6B7280" letter-spacing="1">POWER BI · DATABRICKS · FIGMA · NEXT.JS</text>

  <!-- dashboard window mockup, right side -->
  <g>
    <rect x="620" y="40" width="530" height="240" rx="14" fill="#12141C" stroke="#262A38" stroke-width="1.5"/>
    <line x1="620" y1="72" x2="1150" y2="72" stroke="#262A38" stroke-width="1"/>
    <circle cx="642" cy="56" r="4.5" fill="#38BDF8"/>
    <circle cx="660" cy="56" r="4.5" fill="#8B5CF6"/>
    <circle cx="678" cy="56" r="4.5" fill="#22D3EE"/>
    <text x="900" y="60" class="label" font-size="11" fill="#4B5563" text-anchor="middle" letter-spacing="1">DASHBOARD.PBIX</text>

    <!-- KPI card -->
    <rect x="1010" y="88" width="118" height="60" rx="8" fill="#181B26" stroke="#262A38"/>
    <text x="1022" y="110" class="label" font-size="10" fill="#94A3B8" letter-spacing="1">ON-TIME</text>
    <text x="1022" y="136" class="headline" font-size="22" font-weight="700" fill="#22D3EE" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze" begin="1.6s"/>
      94%
    </text>

    <!-- bar chart, grows from baseline -->
    <rect x="650" y="260" width="26" height="0" fill="url(#barGrad)" rx="3">
      <animate attributeName="y" from="260" to="205" dur="0.7s" fill="freeze" begin="0.3s"/>
      <animate attributeName="height" from="0" to="55" dur="0.7s" fill="freeze" begin="0.3s"/>
    </rect>
    <rect x="690" y="260" width="26" height="0" fill="url(#barGrad)" rx="3">
      <animate attributeName="y" from="260" to="180" dur="0.7s" fill="freeze" begin="0.5s"/>
      <animate attributeName="height" from="0" to="80" dur="0.7s" fill="freeze" begin="0.5s"/>
    </rect>
    <rect x="730" y="260" width="26" height="0" fill="url(#barGrad)" rx="3">
      <animate attributeName="y" from="260" to="215" dur="0.7s" fill="freeze" begin="0.7s"/>
      <animate attributeName="height" from="0" to="45" dur="0.7s" fill="freeze" begin="0.7s"/>
    </rect>
    <rect x="770" y="260" width="26" height="0" fill="url(#barGrad)" rx="3">
      <animate attributeName="y" from="260" to="165" dur="0.7s" fill="freeze" begin="0.9s"/>
      <animate attributeName="height" from="0" to="95" dur="0.7s" fill="freeze" begin="0.9s"/>
    </rect>
    <rect x="810" y="260" width="26" height="0" fill="url(#barGrad)" rx="3">
      <animate attributeName="y" from="260" to="195" dur="0.7s" fill="freeze" begin="1.1s"/>
      <animate attributeName="height" from="0" to="65" dur="0.7s" fill="freeze" begin="1.1s"/>
    </rect>

    <!-- trend line combo over the bars -->
    <path d="M655,190 L695,150 L735,175 L775,120 L815,155" fill="none" stroke="#FB923C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="220" stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1s" fill="freeze" begin="1.4s"/>
    </path>
    <circle cx="815" cy="155" r="4" fill="#FB923C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze" begin="2.3s"/>
    </circle>

    <!-- donut ring -->
    <g transform="translate(900,225)">
      <circle r="30" fill="none" stroke="#262A38" stroke-width="8"/>
      <circle r="30" fill="none" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"
        stroke-dasharray="188.4" stroke-dashoffset="188.4" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" from="188.4" to="47" dur="1s" fill="freeze" begin="1.7s"/>
      </circle>
      <text class="headline" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle" dy="5">72%</text>
    </g>
  </g>
</svg>
